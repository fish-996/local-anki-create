name: Build and Push Next.js Docker Image

# 触发条件：当代码推送到 main 分支时执行
on:
  push:
    branches:
      - master  # 如果你的主分支叫 master，请修改为 master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 QEMU（用于支持多架构编译，兼容 ARM 架构的 NAS）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Docker Buildx（构建工具）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 编译成同时支持 amd64 和 arm64 的镜像
          platforms: linux/amd64,linux/arm64
          # 给镜像打标签，规则为：用户名/镜像名:latest。 
          # 注意：请把 "my-nextjs-app" 替换为你想要的镜像名称（要求全小写）
          tags: ${{ secrets.DOCKER_USERNAME }}/my-nextjs-app:latest
